name: 🚀 Release & Version Management

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для релиза (например, 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: 📦 Build & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: 🏷️ Получение версии
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 📝 Генерация CHANGELOG
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            {
              echo "🎉 Первый релиз!"
              echo ""
              echo "### Все изменения:"
              git log --pretty=format:"- %s (%h)"
            } > changelog.md
          else
            {
              echo "### Изменения с версии ${PREVIOUS_TAG}:"
              echo ""
              # Показываем только последние 2 коммита (основные изменения версии)
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" | head -2
            } > changelog.md
          fi

      - name: 📊 Подсчёт статистики
        id: stats
        run: |
          TOTAL_FILES=$(find . -name "*.py" | wc -l | tr -d ' ')
          TOTAL_LINES=$(find . -name "*.py" -exec cat {} \; | wc -l | tr -d ' ')
          echo "total_files=${TOTAL_FILES}" >> "$GITHUB_OUTPUT"
          echo "total_lines=${TOTAL_LINES}" >> "$GITHUB_OUTPUT"

      - name: 📦 Создание ZIP архива
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          zip -r "flbs-release-${VERSION}.zip" . \
            -x "*.git*" \
            -x "*.github*" \
            -x "__pycache__*" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x ".DS_Store" \
            -x "*.md" \
            -x "LICENSE"

      - name: 📝 Формирование описания релиза
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TOTAL_FILES="${{ steps.stats.outputs.total_files }}"
          TOTAL_LINES="${{ steps.stats.outputs.total_lines }}"

          cat > release_body.md << 'ENDBODY'
          ## 🎉 Релиз FLBS vVERSION_PLACEHOLDER
          ENDBODY

          # Подставляем версию отдельно, без heredoc
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" release_body.md

          cat >> release_body.md << 'ENDBODY'

          ENDBODY

          cat changelog.md >> release_body.md

          cat >> release_body.md << ENDBODY

          ---

          ## 📊 Статистика проекта
          - 📄 Файлов Python: ${TOTAL_FILES}
          - 📝 Строк кода: ${TOTAL_LINES}

          ---

          ## 📥 Установка

          ### 1. Скачайте архив
          - [flbs-release-${VERSION}.zip](../../releases/download/v${VERSION}/flbs-release-${VERSION}.zip)

          ### 2. Распакуйте
          \`\`\`bash
          unzip flbs-release-${VERSION}.zip
          cd flbs
          \`\`\`

          ### 3. Установите зависимости
          \`\`\`bash
          pip install -r requirements.txt
          \`\`\`

          ### 4. Настройте переменные окружения
          См. подробную инструкцию в [README.md](../../blob/main/README.md)

          ---

          ## 📖 Документация
          - [🇷🇺 Русская версия](../../blob/main/README.md)
          - [🇬🇧 English version](../../blob/main/README_en.md)

          ---

          ## 🐛 Сообщить о проблеме
          - [Создать Issue](../../issues/new/choose)

          ---

          **Сделано с ❤️ для любителей книг**
          ENDBODY

      - name: ✨ Создание релиза на GitHub
        uses: softprops/action-gh-release@v1
        with:
          name: "📚 FLBS v${{ steps.get_version.outputs.version }}"
          body_path: release_body.md
          tag_name: "v${{ steps.get_version.outputs.version }}"
          files: "flbs-release-${{ steps.get_version.outputs.version }}.zip"
          draft: false
          prerelease: false
          make_latest: true

      - name: 🎉 Уведомление об успехе
        run: |
          echo "✅ Релиз v${{ steps.get_version.outputs.version }} успешно создан!"
          echo "📦 Архив: flbs-release-${{ steps.get_version.outputs.version }}.zip"
          echo "🔗 Ссылка: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.version }}"
